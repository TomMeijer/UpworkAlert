<div class="modal-header">
  <h4 class="modal-title pull-left">Search Criteria</h4>
  <button type="button" class="btn-close close pull-right" aria-label="Close" (click)="bsModalRef.hide()">
    <span aria-hidden="true" class="visually-hidden">&times;</span>
  </button>
</div>
<div class="modal-body">

  @if (error()) {
    <div class="alert alert-danger">
      {{ error() }}
    </div>
  } @else if (isLoading()) {
    <div class="text-center p-3">
      <div class="spinner-border text-success"></div>
    </div>
  } @else {
    <form #criteriaForm="ngForm">
      <div class="mb-3">
        <label for="searchExpression" class="form-label">Search Expression</label>
        <input type="text"
               class="form-control"
               id="searchExpression"
               name="searchExpression"
               [ngModel]="criteria().searchExpression"
               (ngModelChange)="criteria.update(c => ({...c, searchExpression: $event}))">
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="minHourlyRate" class="form-label">Min Hourly Rate</label>
          <div class="input-group">
            <span class="input-group-text">$</span>
            <input type="number"
                   class="form-control"
                   id="minHourlyRate"
                   name="minHourlyRate"
                   [ngModel]="criteria().minHourlyRate"
                   (ngModelChange)="criteria.update(c => ({...c, minHourlyRate: $event}))">
          </div>
        </div>
        <div class="col-md-6 mb-3">
          <label for="minFixedPrice" class="form-label">Min Fixed Price</label>
          <div class="input-group">
            <span class="input-group-text">$</span>
            <input type="number"
                   class="form-control"
                   id="minFixedPrice"
                   name="minFixedPrice"
                   [ngModel]="criteria().minFixedPrice"
                   (ngModelChange)="criteria.update(c => ({...c, minFixedPrice: $event}))">
          </div>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Categories</label>
        <div class="category-grid">
          @for (cat of categories; track cat.value) {
            <div class="form-check">
              <input class="form-check-input"
                     type="checkbox"
                     [id]="'cat-' + cat.value"
                     [checked]="criteria().categoryIds.includes(cat.value)"
                     (change)="toggleCategory(cat.value)">
              <label class="form-check-label" [for]="'cat-' + cat.value">
                {{ cat.name }}
              </label>
            </div>
          }
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Locations</label>
        <div class="location-grid">
          @for (loc of locations; track loc) {
            <div class="form-check">
              <input class="form-check-input"
                     type="checkbox"
                     [id]="'loc-' + loc"
                     [checked]="criteria().locations.includes(loc)"
                     (change)="toggleLocation(loc)">
              <label class="form-check-label" [for]="'loc-' + loc">
                {{ loc }}
              </label>
            </div>
          }
        </div>
      </div>
    </form>
  }
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-secondary" (click)="bsModalRef.hide()">Cancel</button>
  <button type="button" class="btn btn-primary" [disabled]="error() || isLoading() || isSaving()" (click)="save()">
    Save changes
  </button>
</div>
